services:
  postgres:
    image: postgres:16-alpine
    container_name: vacaciones-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vacaciones
      POSTGRES_PASSWORD: vacaciones
      POSTGRES_DB: vacaciones_legendarias
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
